name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm@10.12.1).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Audit doc previews
        run: pnpm run audit:previews

      - name: Audit registry boundary
        run: pnpm run audit:registry-boundary

      - name: Validate agent skills
        run: pnpm skill:validate

      - name: Sync skills (no drift)
        run: |
          pnpm sync:skills
          git diff --exit-code -- public/.well-known/agent-skills .agents/skills/beecharts

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-cache-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-next-cache-

      - name: Build
        run: pnpm run build
